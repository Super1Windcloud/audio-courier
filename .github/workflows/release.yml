name: release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: Optional release notes. Leave empty to use the default note.
        required: false
        type: string
  push:
    branches:
      - release

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      default_branch: ${{ steps.meta.outputs.default_branch }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
      release_target_commitish: ${{ steps.meta.outputs.release_target_commitish }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: lts/*

      - id: meta
        name: resolve release metadata
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          RELEASE_NOTES_INPUT: ${{ github.event.inputs.release_notes }}
        run: |
          version=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          if [[ -z "$version" ]]; then
            echo "package.json version is empty" >&2
            exit 1
          fi

          tag_name="audio-courier-v${version}"
          release_name="audio-courier v${version}"

          if [[ "$EVENT_NAME" == "push" && "$REF_TYPE" == "tag" && "$REF_NAME" != "$tag_name" ]]; then
            echo "tag ${REF_NAME} does not match package.json version ${version} (expected ${tag_name})" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" && "$REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "manual release must run from ${DEFAULT_BRANCH}, got ${REF_NAME}" >&2
            exit 1
          fi

          {
            echo "default_branch=${DEFAULT_BRANCH}"
            echo "release_name=${release_name}"
            echo "release_target_commitish=${GITHUB_SHA}"
            echo "tag_name=${tag_name}"
            echo "version=${version}"
            echo "release_notes<<EOF"
            printf '%s\n' "$RELEASE_NOTES_INPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            artifact_name: bundle-macos-aarch64
            apple_signing_identity: "-"
          - name: macos-x86_64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
            artifact_name: bundle-macos-x86_64
            apple_signing_identity: "-"
          - name: linux-x86_64
            runner: ubuntu-22.04
            rust_target: ""
            tauri_args: ""
            artifact_name: bundle-linux-x86_64
            apple_signing_identity: ""
          - name: windows-x86_64
            runner: windows-latest
            rust_target: ""
            tauri_args: ""
            artifact_name: bundle-windows-x86_64
            apple_signing_identity: ""
    env:
      APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
      CI: "true"
      RELEASE_TAURI_ARGS: ${{ matrix.tauri_args }}
      TAURI_SIGNING_PRIVATE_KEY: 
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: superwindcloud
    steps:
      - uses: actions/checkout@v4

      - name: install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: lts/*

      - name: install Rust stable
        if: matrix.rust_target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: install Rust target
        if: matrix.rust_target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: build signed Tauri bundles
        run: pnpm release:build

      - name: upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle
          retention-days: 7

  publish:
    name: publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEFAULT_BRANCH: ${{ needs.prepare.outputs.default_branch }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
      RELEASE_NOTES: ${{ needs.prepare.outputs.release_notes }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag_name }}
      RELEASE_TARGET_COMMITISH: ${{ needs.prepare.outputs.release_target_commitish }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: lts/*

      - name: install publish dependencies
        run: pnpm install --frozen-lockfile

      - name: download built bundles
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: src-tauri/target/release/bundle
          pattern: bundle-*

      - name: inspect downloaded bundles
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 4 -type f | sort

      - name: publish GitHub release assets
        run: pnpm release:publish

      - name: update updater manifest on default branch
        shell: bash
        run: |
          manifest_path="$GITHUB_WORKSPACE/updater/latest.json"
          temp_manifest="$RUNNER_TEMP/latest.json"

          if [[ ! -f "$manifest_path" ]]; then
            echo "updater/latest.json was not generated" >&2
            exit 1
          fi

          cp "$manifest_path" "$temp_manifest"
          git restore updater/latest.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          mkdir -p updater
          cp "$temp_manifest" updater/latest.json

          if git diff --quiet -- updater/latest.json; then
            echo "updater/latest.json already matches ${RELEASE_TAG}"
            exit 0
          fi

          git add updater/latest.json
          git commit -m "chore: update updater manifest for v${RELEASE_VERSION}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
